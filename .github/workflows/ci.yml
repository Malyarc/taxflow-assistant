name: CI

# Closes the "green-on-wrong-shape" + "tests only run when a human remembers"
# gap (P0-6). Every push to main and every PR must pass: full workspace
# typecheck, a typecheck of the test suites themselves (no excludes), and the
# no-API engine test battery. Make this a required status check in branch
# protection so red cannot merge.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (workspace — libs + artifacts + scripts)
        run: pnpm run typecheck

      - name: Typecheck test suites (no excludes — guards engine fixtures)
        run: pnpm --filter @workspace/scripts run typecheck:tests

      - name: Run no-API engine test battery
        run: pnpm --filter @workspace/scripts run test:no-api

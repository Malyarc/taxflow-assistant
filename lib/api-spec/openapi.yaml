          type: ["string", "null"]
        dateSold:
          type: ["string", "null"]
        proceeds:
          type: number
        costBasis:
          type: number
        quantity:
          type: ["number", "null"]
          description: Shares/units in this lot. When both a loss sale and its replacement supply a positive quantity, §1091 wash-sale disallowance is proportional (min(replQty,soldQty)/soldQty); absent → full disallowance.
        account:
          type: ["string", "null"]
          description: Brokerage account label (reporting only). The wash-sale detector matches across accounts regardless of this field (§1091 is per-taxpayer).
        adjustmentCode:
          type: ["string", "null"]
        adjustmentAmount:
          type: number
        washSaleDisallowed:
          type: number
        washSaleAutoDetected:
          type: boolean
          description: E13 — TRUE when the engine auto-detected this as a wash sale (vs. broker-reported via adjustmentCode "W"). Set on the disallowed-loss row.
        formBox:
          type: string
          enum: [A, B, C, D, E, F]
        propertyStateSitus:
          type: ["string", "null"]
          description: PREP-B1 — 2-letter state code for the situs of the underlying real/tangible property. With the nonresident_source_allocation marker on, the gain is sourced to that state as non-resident income (real-property situs rule). Intangible gains (stocks/bonds) carry no situs (4 U.S.C. §114(a)).
        gainClass:
          type: ["string", "null"]
          enum: [section1250, collectible, section1202, null]
          description: T1.1a — special LTCG rate character (IRC §1(h)) for a long-term lot. "section1250" → unrecaptured §1250 gain (25% max); "collectible" → 28%-rate gain; "section1202" → taxable §1202 portion (28%). Null/empty → default 0/15/20%.

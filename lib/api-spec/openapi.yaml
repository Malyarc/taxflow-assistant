openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Tax Filing Efficiency API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: settings
    description: Server-side flags exposed to the frontend (Pro tier, etc.)
  - name: clients
    description: Client management
  - name: documents
    description: Tax document uploads
  - name: w2data
    description: W-2 form data
  - name: taxReturns
    description: Tax return calculations
  - name: adjustments
    description: CPA manual adjustments
  - name: dashboard
    description: Dashboard summary data
  - name: rentalProperties
    description: Schedule E rental real estate (per-property tracking)
  - name: capitalTransactions
    description: Schedule D / Form 8949 per-transaction capital gains/losses
  - name: scheduleK1
    description: Schedule K-1 from partnerships (1065) and S-corps (1120-S)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Server-side feature flags exposed to the frontend
      description: >
        Returns env-driven flags the frontend uses to gate UI surfaces.
        Currently exposes the Phase G5 Pro-tier flag. Add new fields only
        when the client genuinely needs them; never expose secrets here.
      responses:
        "200":
          description: Settings snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  # ── Clients ──────────────────────────────────────────────────────────────
  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List clients (keyset-paginated, most-recently-updated first)
      description: >
        Returns one page of clients ordered by updatedAt DESC (id DESC tiebreak).
        Pass the previous response's nextCursor back as `cursor` to fetch the next
        page; nextCursor is null on the last page. Search (`q`) and `filingStatus`
        are applied server-side.
      parameters:
        - name: limit
          in: query
          required: false
          description: Page size (default 50, hard cap 200).
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: cursor
          in: query
          required: false
          description: Opaque keyset cursor from a prior response's nextCursor.
          schema:
            type: string
        - name: q
          in: query
          required: false
          description: Case-insensitive substring match across first name, last name, and email.
          schema:
            type: string
        - name: filingStatus
          in: query
          required: false
          description: Exact filing-status filter.
          schema:
            type: string
      responses:
        "200":
          description: A page of clients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientListPage"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientBody"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Documents ────────────────────────────────────────────────────────────
  /clients/{clientId}/documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxDocument"
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a tax document and trigger AI extraction
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadDocumentBody"
      responses:
        "201":
          description: Uploaded document with extracted data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxDocument"

  /clients/{clientId}/documents/{documentId}:
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a tax document
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clients/{clientId}/documents/{documentId}/approve:
    post:
      operationId: approveExtraction
      tags: [documents]
      summary: Approve extracted document fields, creating the underlying w2/1099 record
      description: |
        Called when the CPA has reviewed (and possibly edited) the AI-extracted
        values for a document in `pending_review` status. Inserts a new
        w2_data or form_1099_data row, writes an audit-log entry with
        `source = "AI extraction from {fileName}"`, links the document to
        the created record, and recalculates the tax return.
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveExtractionBody"
      responses:
        "200":
          description: Document approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxDocument"

  /clients/{clientId}/documents/{documentId}/reject:
    post:
      operationId: rejectExtraction
      tags: [documents]
      summary: Reject extracted document fields without writing any income record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectExtractionBody"
      responses:
        "200":
          description: Document rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxDocument"

  # ── W-2 Data ─────────────────────────────────────────────────────────────
  /clients/{clientId}/w2data:
    get:
      operationId: listW2Data
      tags: [w2data]
      summary: List all W-2 records for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of W-2 records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/W2Data"
    post:
      operationId: createW2Data
      tags: [w2data]
      summary: Manually create a W-2 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateW2DataBody"
      responses:
        "201":
          description: Created W-2 record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/W2Data"

  /clients/{clientId}/w2data/{w2Id}:
    patch:
      operationId: updateW2Data
      tags: [w2data]
      summary: Update a W-2 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: w2Id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateW2DataBody"
      responses:
        "200":
          description: Updated W-2 record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/W2Data"
        "404":
          description: Not found
    delete:
      operationId: deleteW2Data
      tags: [w2data]
      summary: Delete a W-2 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: w2Id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── 1099 Forms ────────────────────────────────────────────────────────────
  /clients/{clientId}/form1099data:
    get:
      operationId: listForm1099Data
      tags: [w2data]
      summary: List all 1099 records for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of 1099 records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Form1099Data"
    post:
      operationId: createForm1099Data
      tags: [w2data]
      summary: Manually create a 1099 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateForm1099DataBody"
      responses:
        "201":
          description: Created 1099 record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form1099Data"

  /clients/{clientId}/form1099data/{form1099Id}:
    patch:
      operationId: updateForm1099Data
      tags: [w2data]
      summary: Update a 1099 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: form1099Id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateForm1099DataBody"
      responses:
        "200":
          description: Updated 1099 record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form1099Data"
        "404":
          description: Not found
    delete:
      operationId: deleteForm1099Data
      tags: [w2data]
      summary: Delete a 1099 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: form1099Id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Tax Returns ───────────────────────────────────────────────────────────
  /clients/{clientId}/tax-return:
    get:
      operationId: getTaxReturn
      tags: [taxReturns]
      summary: Get the current tax return calculation for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tax return calculation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxReturn"
        "404":
          description: Not found
    post:
      operationId: calculateTaxReturn
      tags: [taxReturns]
      summary: Calculate or recalculate the tax return for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculateTaxReturnBody"
      responses:
        "200":
          description: Calculated tax return
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxReturn"
    patch:
      operationId: updateTaxReturn
      tags: [taxReturns]
      summary: Manually update tax return fields
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaxReturnBody"
      responses:
        "200":
          description: Updated tax return
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxReturn"

  # ── Planning hit list (Phase G2) ──────────────────────────────────────────
  /planning-hit-list:
    get:
      operationId: getPlanningHitList
      tags: [planning]
      summary: List all clients ranked by planning-engagement score
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [retirement, state, charitable, timing, business, investment, credits]
        - name: minAgi
          in: query
          required: false
          schema:
            type: number
        - name: maxAgi
          in: query
          required: false
          schema:
            type: number
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Hit list ranked desc by PlanningScore
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanningHitList"
        "402":
          description: Pro tier disabled (PRO_TIER_ENABLED=false on the server)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"

  # ── Planning memo + email + missing data (Phase G3) ───────────────────────
  /clients/{clientId}/planning-memo:
    get:
      operationId: getPlanningMemo
      tags: [planning]
      summary: AI-generated CPA-facing planning memo
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Planning memo (markdown)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanningMemo"
        "402":
          description: Pro tier disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"
        "404":
          description: Client not found
  /clients/{clientId}/planning-email:
    get:
      operationId: getPlanningClientEmail
      tags: [planning]
      summary: AI-drafted client outreach email
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email body draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanningMemo"
        "402":
          description: Pro tier disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"
        "404":
          description: Client not found
  /clients/{clientId}/planning-missing-data:
    get:
      operationId: getPlanningMissingData
      tags: [planning]
      summary: Questions the CPA still needs to ask the client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Missing-data items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanningMissingData"
        "402":
          description: Pro tier disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"
        "404":
          description: Client not found

  # ── Planning opportunities (Phase G) ──────────────────────────────────────
  /clients/{clientId}/planning-opportunities:
    get:
      operationId: getPlanningOpportunities
      tags: [planning]
      summary: List detected planning opportunities for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Planning opportunities (deterministic — Layer 2 engine)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanningOpportunities"
        "402":
          description: Pro tier disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"
        "404":
          description: Client not found

  /clients/{clientId}/planning-multi-year:
    get:
      operationId: getPlanningMultiYear
      tags: [planning]
      summary: Multi-year tax-planning patterns (Phase G4)
      description: >
        Detects opportunities that fire on multi-year patterns across the
        client's tax_returns history (persistent NIIT/AMT, std-ded cliff,
        capital-loss carryforward unused, growing passive-loss suspension).
        Requires at least 2 years of computed tax_returns rows; returns an
        empty hits array when only one year is available.
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Multi-year planning opportunities (deterministic — Layer 2 engine)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanningMultiYear"
        "402":
          description: Pro tier disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"
        "404":
          description: Client not found

  /clients/{clientId}/planning-discovery:
    get:
      operationId: getPlanningDiscovery
      tags: [planning]
      summary: AI-powered fact-pattern strategy discovery (Phase H — H8)
      description: >
        Asks the LLM to identify candidate tax-planning strategies the
        deterministic rule engine may have missed. The LLM receives the
        client's tax snapshot + already-detected hits + the FULL strategy
        catalog, and returns a JSON array of candidates with name, IRC
        section, confidence (LLM-self-reported 0.0-1.0), rationale, and
        prerequisiteData.

        Engine math is NEVER touched by the LLM — output is qualitative.
        Returns empty candidates array when AI is disabled (no API key)
        or when the LLM finds nothing.
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Discovery result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanningDiscovery"
        "402":
          description: Pro tier disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"
        "404":
          description: Client not found

  /clients/{clientId}/peer-benchmark:
    get:
      operationId: getPeerBenchmark
      tags: [planning]
      summary: Compare client's effective tax rate to firm-wide peers (Phase H — H11)
      description: >
        Loads all firm clients within an AGI band around the target client
        and computes cohort statistics: mean / median / p25 / p75 effective
        tax rate. Returns the client's own effective rate + percentile rank
        within the cohort, so CPAs can flag clients paying significantly
        more (or less) than peers.

        Default AGI band: ±$50,000 around target AGI. Override via query.
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: bandWidth
          in: query
          description: AGI band width in dollars (default $50,000 → ±$50k around target).
          schema:
            type: number
      responses:
        "200":
          description: Peer benchmark statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeerBenchmarkResponse"
        "402":
          description: Pro tier disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"
        "404":
          description: Client not found

  /clients/{clientId}/state-comparison:
    post:
      operationId: runStateComparison
      tags: [planning]
      summary: Compare client's tax burden across alternate resident states (Phase H — H4)
      description: >
        Runs the H2 what-if engine for each target state by mutating
        `client.state` and recomputing. Returns a sorted list of
        `{ state, deltaFederal, deltaState, deltaCombined }` highlighting
        the tax impact of moving. Default target states are zero-income-tax
        jurisdictions (TX/FL/NV/WA/TN). Excludes the client's current state
        from the comparison automatically.

        Important caveats CPAs must communicate:
          * Engine mutates the resident state but does NOT model income
            sourcing (e.g., W-2 wages remain tied to the original work state).
            Real moves require multi-state allocation per state rules.
          * Domicile rules vary — establishing residency in a new state
            requires more than tax filing (driver's license, voter
            registration, days-present test, etc.).
          * Does NOT model real estate, cost of living, or the new state's
            sales / property tax burden.
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StateComparisonBody"
      responses:
        "200":
          description: State-comparison table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateComparisonResponse"
        "402":
          description: Pro tier disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"
        "404":
          description: Client not found

  /clients/{clientId}/roth-optimizer:
    post:
      operationId: runRothOptimizer
      tags: [planning]
      summary: Multi-year Roth-conversion bracket-fill ladder (PLAN-B1)
      description: >
        Computes the recommended Roth-conversion ladder over a horizon: in each
        projected year it converts just enough traditional-IRA money to fill the
        TOP of the client's current federal ordinary bracket (capped by the
        remaining IRA balance) and uses the tax engine to compute the EXACT
        current-year federal tax cost — no heuristic. Pure; does not write to the DB.

        v1 core models the bracket-fill ladder + engine-exact conversion cost.
        The long-term-value model (RMD avoidance, IRMAA Part-B/D surcharges,
        Social-Security taxability interaction) is the next increment and is
        disclosed in the response `assumptions`. Multi-year projections clamp
        bracket tables to the latest supported year (absolute figures drift past
        that; year-over-year deltas remain meaningful).
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RothOptimizerBody"
      responses:
        "200":
          description: Roth-conversion ladder plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RothOptimizerResponse"
        "400":
          description: Invalid request body
        "402":
          description: Pro tier disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"
        "404":
          description: Client not found

  /clients/{clientId}/what-if:
    post:
      operationId: runWhatIfScenario
      tags: [planning]
      summary: Run a what-if scenario against the client's current return (Phase H — H2)
      description: >
        Loads the client's current TaxReturnInputs (same source as the
        persisted return), applies the requested mutations, re-runs
        computeTaxReturnPure, and returns the federal+state tax delta
        vs the baseline. Pure — does not write to the DB.

        Generalizes the C4 amendment-diff pattern. Foundation primitive
        for Phase H planning quantification — turns every G1/G4 rule
        into actual delta-dollar values.
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WhatIfScenarioBody"
      responses:
        "200":
          description: What-if result with baseline + scenario summaries + delta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatIfResponse"
        "400":
          description: Invalid mutation in request body
        "402":
          description: Pro tier disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"
        "404":
          description: Client not found

  # ── Adjustments ───────────────────────────────────────────────────────────
  /clients/{clientId}/adjustments:
    get:
      operationId: listAdjustments

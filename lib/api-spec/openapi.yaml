          description: List of adjustments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Adjustment"
    post:
      operationId: createAdjustment
      tags: [adjustments]
      summary: Add a CPA adjustment case
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAdjustmentBody"
      responses:
        "201":
          description: Created adjustment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Adjustment"

  /clients/{clientId}/adjustments/{adjustmentId}:
    patch:

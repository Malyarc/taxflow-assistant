openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Tax Filing Efficiency API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clients
    description: Client management
  - name: documents
    description: Tax document uploads
  - name: w2data
    description: W-2 form data
  - name: taxReturns
    description: Tax return calculations
  - name: adjustments
    description: CPA manual adjustments
  - name: dashboard
    description: Dashboard summary data
  - name: rentalProperties
    description: Schedule E rental real estate (per-property tracking)
  - name: capitalTransactions
    description: Schedule D / Form 8949 per-transaction capital gains/losses
  - name: scheduleK1
    description: Schedule K-1 from partnerships (1065) and S-corps (1120-S)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Clients ──────────────────────────────────────────────────────────────
  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientBody"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Documents ────────────────────────────────────────────────────────────
  /clients/{clientId}/documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxDocument"
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a tax document and trigger AI extraction
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadDocumentBody"
      responses:
        "201":
          description: Uploaded document with extracted data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxDocument"

  /clients/{clientId}/documents/{documentId}:
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a tax document
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clients/{clientId}/documents/{documentId}/approve:
    post:
      operationId: approveExtraction
      tags: [documents]
      summary: Approve extracted document fields, creating the underlying w2/1099 record
      description: |
        Called when the CPA has reviewed (and possibly edited) the AI-extracted
        values for a document in `pending_review` status. Inserts a new
        w2_data or form_1099_data row, writes an audit-log entry with
        `source = "AI extraction from {fileName}"`, links the document to
        the created record, and recalculates the tax return.
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveExtractionBody"
      responses:
        "200":
          description: Document approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxDocument"

  /clients/{clientId}/documents/{documentId}/reject:
    post:
      operationId: rejectExtraction
      tags: [documents]
      summary: Reject extracted document fields without writing any income record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectExtractionBody"
      responses:
        "200":
          description: Document rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxDocument"

  # ── W-2 Data ─────────────────────────────────────────────────────────────
  /clients/{clientId}/w2data:
    get:
      operationId: listW2Data
      tags: [w2data]
      summary: List all W-2 records for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of W-2 records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/W2Data"
    post:
      operationId: createW2Data
      tags: [w2data]
      summary: Manually create a W-2 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateW2DataBody"
      responses:
        "201":
          description: Created W-2 record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/W2Data"

  /clients/{clientId}/w2data/{w2Id}:
    patch:
      operationId: updateW2Data
      tags: [w2data]
      summary: Update a W-2 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: w2Id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateW2DataBody"
      responses:
        "200":
          description: Updated W-2 record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/W2Data"
        "404":
          description: Not found
    delete:
      operationId: deleteW2Data
      tags: [w2data]
      summary: Delete a W-2 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: w2Id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── 1099 Forms ────────────────────────────────────────────────────────────
  /clients/{clientId}/form1099data:
    get:
      operationId: listForm1099Data
      tags: [w2data]
      summary: List all 1099 records for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of 1099 records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Form1099Data"
    post:
      operationId: createForm1099Data
      tags: [w2data]
      summary: Manually create a 1099 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateForm1099DataBody"
      responses:
        "201":
          description: Created 1099 record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form1099Data"

  /clients/{clientId}/form1099data/{form1099Id}:
    patch:
      operationId: updateForm1099Data
      tags: [w2data]
      summary: Update a 1099 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: form1099Id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateForm1099DataBody"
      responses:
        "200":
          description: Updated 1099 record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form1099Data"
        "404":
          description: Not found
    delete:
      operationId: deleteForm1099Data
      tags: [w2data]
      summary: Delete a 1099 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: form1099Id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Tax Returns ───────────────────────────────────────────────────────────
  /clients/{clientId}/tax-return:
    get:
      operationId: getTaxReturn
      tags: [taxReturns]
      summary: Get the current tax return calculation for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tax return calculation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxReturn"
        "404":
          description: Not found
    post:
      operationId: calculateTaxReturn
      tags: [taxReturns]
      summary: Calculate or recalculate the tax return for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculateTaxReturnBody"
      responses:
        "200":
          description: Calculated tax return
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxReturn"
    patch:
      operationId: updateTaxReturn
      tags: [taxReturns]
      summary: Manually update tax return fields
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaxReturnBody"
      responses:
        "200":
          description: Updated tax return
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxReturn"

  # ── Adjustments ───────────────────────────────────────────────────────────

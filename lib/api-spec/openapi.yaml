openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Tax Filing Efficiency API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: settings
    description: Server-side flags exposed to the frontend (Pro tier, etc.)
  - name: clients
    description: Client management
  - name: documents
    description: Tax document uploads
  - name: w2data
    description: W-2 form data
  - name: taxReturns
    description: Tax return calculations
  - name: adjustments
    description: CPA manual adjustments
  - name: dashboard
    description: Dashboard summary data
  - name: rentalProperties
    description: Schedule E rental real estate (per-property tracking)
  - name: capitalTransactions
    description: Schedule D / Form 8949 per-transaction capital gains/losses
  - name: scheduleK1
    description: Schedule K-1 from partnerships (1065) and S-corps (1120-S)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Server-side feature flags exposed to the frontend
      description: >
        Returns env-driven flags the frontend uses to gate UI surfaces.
        Currently exposes the Phase G5 Pro-tier flag. Add new fields only
        when the client genuinely needs them; never expose secrets here.
      responses:
        "200":
          description: Settings snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  # ── Clients ──────────────────────────────────────────────────────────────
  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientBody"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Documents ────────────────────────────────────────────────────────────
  /clients/{clientId}/documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxDocument"
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a tax document and trigger AI extraction
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadDocumentBody"
      responses:
        "201":
          description: Uploaded document with extracted data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxDocument"

  /clients/{clientId}/documents/{documentId}:
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a tax document
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clients/{clientId}/documents/{documentId}/approve:
    post:
      operationId: approveExtraction
      tags: [documents]
      summary: Approve extracted document fields, creating the underlying w2/1099 record
      description: |
        Called when the CPA has reviewed (and possibly edited) the AI-extracted
        values for a document in `pending_review` status. Inserts a new
        w2_data or form_1099_data row, writes an audit-log entry with
        `source = "AI extraction from {fileName}"`, links the document to
        the created record, and recalculates the tax return.
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveExtractionBody"
      responses:
        "200":
          description: Document approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxDocument"

  /clients/{clientId}/documents/{documentId}/reject:
    post:
      operationId: rejectExtraction
      tags: [documents]
      summary: Reject extracted document fields without writing any income record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectExtractionBody"
      responses:
        "200":
          description: Document rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxDocument"

  # ── W-2 Data ─────────────────────────────────────────────────────────────
  /clients/{clientId}/w2data:
    get:
      operationId: listW2Data
      tags: [w2data]
      summary: List all W-2 records for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of W-2 records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/W2Data"
    post:
      operationId: createW2Data
      tags: [w2data]
      summary: Manually create a W-2 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateW2DataBody"
      responses:
        "201":
          description: Created W-2 record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/W2Data"

  /clients/{clientId}/w2data/{w2Id}:
    patch:
      operationId: updateW2Data
      tags: [w2data]
      summary: Update a W-2 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: w2Id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateW2DataBody"
      responses:
        "200":
          description: Updated W-2 record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/W2Data"
        "404":
          description: Not found
    delete:
      operationId: deleteW2Data
      tags: [w2data]
      summary: Delete a W-2 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: w2Id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── 1099 Forms ────────────────────────────────────────────────────────────
  /clients/{clientId}/form1099data:
    get:
      operationId: listForm1099Data
      tags: [w2data]
      summary: List all 1099 records for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of 1099 records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Form1099Data"
    post:
      operationId: createForm1099Data
      tags: [w2data]
      summary: Manually create a 1099 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateForm1099DataBody"
      responses:
        "201":
          description: Created 1099 record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form1099Data"

  /clients/{clientId}/form1099data/{form1099Id}:
    patch:
      operationId: updateForm1099Data
      tags: [w2data]
      summary: Update a 1099 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: form1099Id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateForm1099DataBody"
      responses:
        "200":
          description: Updated 1099 record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form1099Data"
        "404":
          description: Not found
    delete:
      operationId: deleteForm1099Data
      tags: [w2data]
      summary: Delete a 1099 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: form1099Id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Tax Returns ───────────────────────────────────────────────────────────
  /clients/{clientId}/tax-return:
    get:
      operationId: getTaxReturn
      tags: [taxReturns]
      summary: Get the current tax return calculation for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tax return calculation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxReturn"
        "404":
          description: Not found
    post:
      operationId: calculateTaxReturn
      tags: [taxReturns]
      summary: Calculate or recalculate the tax return for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculateTaxReturnBody"
      responses:
        "200":
          description: Calculated tax return
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxReturn"
    patch:
      operationId: updateTaxReturn
      tags: [taxReturns]
      summary: Manually update tax return fields
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaxReturnBody"
      responses:
        "200":
          description: Updated tax return
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxReturn"

  # ── Planning hit list (Phase G2) ──────────────────────────────────────────
  /planning-hit-list:
    get:
      operationId: getPlanningHitList
      tags: [planning]
      summary: List all clients ranked by planning-engagement score
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [retirement, state, charitable, timing, business, investment, credits]
        - name: minAgi
          in: query
          required: false
          schema:
            type: number
        - name: maxAgi
          in: query
          required: false
          schema:
            type: number
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Hit list ranked desc by PlanningScore
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanningHitList"
        "402":
          description: Pro tier disabled (PRO_TIER_ENABLED=false on the server)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"

  # ── Planning memo + email + missing data (Phase G3) ───────────────────────
  /clients/{clientId}/planning-memo:
    get:
      operationId: getPlanningMemo
      tags: [planning]
      summary: AI-generated CPA-facing planning memo
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Planning memo (markdown)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanningMemo"
        "402":
          description: Pro tier disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"
        "404":
          description: Client not found
  /clients/{clientId}/planning-email:
    get:
      operationId: getPlanningClientEmail
      tags: [planning]
      summary: AI-drafted client outreach email
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email body draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanningMemo"
        "402":
          description: Pro tier disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"
        "404":
          description: Client not found
  /clients/{clientId}/planning-missing-data:
    get:
      operationId: getPlanningMissingData
      tags: [planning]
      summary: Questions the CPA still needs to ask the client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Missing-data items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanningMissingData"
        "402":
          description: Pro tier disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"
        "404":
          description: Client not found

  # ── Planning opportunities (Phase G) ──────────────────────────────────────
  /clients/{clientId}/planning-opportunities:
    get:
      operationId: getPlanningOpportunities
      tags: [planning]
      summary: List detected planning opportunities for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Planning opportunities (deterministic — Layer 2 engine)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanningOpportunities"
        "402":
          description: Pro tier disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"
        "404":
          description: Client not found

  /clients/{clientId}/planning-multi-year:
    get:
      operationId: getPlanningMultiYear
      tags: [planning]
      summary: Multi-year tax-planning patterns (Phase G4)
      description: >
        Detects opportunities that fire on multi-year patterns across the
        client's tax_returns history (persistent NIIT/AMT, std-ded cliff,
        capital-loss carryforward unused, growing passive-loss suspension).
        Requires at least 2 years of computed tax_returns rows; returns an
        empty hits array when only one year is available.
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Multi-year planning opportunities (deterministic — Layer 2 engine)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanningMultiYear"
        "402":
          description: Pro tier disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"
        "404":
          description: Client not found

  /clients/{clientId}/what-if:
    post:
      operationId: runWhatIfScenario
      tags: [planning]
      summary: Run a what-if scenario against the client's current return (Phase H — H2)
      description: >
        Loads the client's current TaxReturnInputs (same source as the
        persisted return), applies the requested mutations, re-runs
        computeTaxReturnPure, and returns the federal+state tax delta
        vs the baseline. Pure — does not write to the DB.

        Generalizes the C4 amendment-diff pattern. Foundation primitive
        for Phase H planning quantification — turns every G1/G4 rule
        into actual delta-dollar values.
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WhatIfScenarioBody"
      responses:
        "200":
          description: What-if result with baseline + scenario summaries + delta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatIfResponse"
        "400":
          description: Invalid mutation in request body
        "402":
          description: Pro tier disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProTierRequired"
        "404":
          description: Client not found

  # ── Adjustments ───────────────────────────────────────────────────────────
  /clients/{clientId}/adjustments:
    get:
      operationId: listAdjustments
      tags: [adjustments]
      summary: List CPA adjustments for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of adjustments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Adjustment"
    post:
      operationId: createAdjustment
      tags: [adjustments]
      summary: Add a CPA adjustment case
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAdjustmentBody"
      responses:
        "201":
          description: Created adjustment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Adjustment"

  /clients/{clientId}/adjustments/{adjustmentId}:
    patch:
      operationId: updateAdjustment
      tags: [adjustments]
      summary: Update an adjustment
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: adjustmentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdjustmentBody"
      responses:
        "200":
          description: Updated adjustment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Adjustment"
        "404":
          description: Not found
    delete:
      operationId: deleteAdjustment
      tags: [adjustments]
      summary: Delete an adjustment
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: adjustmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Rental properties (Schedule E) ────────────────────────────────────────
  /clients/{clientId}/rental-properties:
    get:
      operationId: listRentalProperties
      tags: [rentalProperties]
      summary: List all rental properties for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of rental properties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RentalProperty"
    post:
      operationId: createRentalProperty
      tags: [rentalProperties]
      summary: Create a rental property record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRentalPropertyBody"
      responses:
        "201":
          description: Created rental property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalProperty"

  /clients/{clientId}/rental-properties/{propertyId}:
    patch:
      operationId: updateRentalProperty
      tags: [rentalProperties]
      summary: Update a rental property
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: propertyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRentalPropertyBody"
      responses:
        "200":
          description: Updated rental property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalProperty"
    delete:
      operationId: deleteRentalProperty
      tags: [rentalProperties]
      summary: Delete a rental property
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: propertyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Capital transactions (Schedule D / Form 8949) ────────────────────────
  /clients/{clientId}/capital-transactions:
    get:
      operationId: listCapitalTransactions
      tags: [capitalTransactions]
      summary: List all capital transactions for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of capital transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CapitalTransaction"
    post:
      operationId: createCapitalTransaction
      tags: [capitalTransactions]
      summary: Create a capital transaction (Form 8949 row)
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCapitalTransactionBody"
      responses:
        "201":
          description: Created capital transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapitalTransaction"

  /clients/{clientId}/capital-transactions/{transactionId}:
    patch:
      operationId: updateCapitalTransaction
      tags: [capitalTransactions]
      summary: Update a capital transaction
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: transactionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCapitalTransactionBody"
      responses:
        "200":
          description: Updated capital transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapitalTransaction"
    delete:
      operationId: deleteCapitalTransaction
      tags: [capitalTransactions]
      summary: Delete a capital transaction
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: transactionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Schedule K-1 (partnership + S-corp pass-through) ────────────────────
  /clients/{clientId}/k1s:
    get:
      operationId: listScheduleK1s
      tags: [scheduleK1]
      summary: List all K-1s for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of K-1s
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleK1"
    post:
      operationId: createScheduleK1
      tags: [scheduleK1]
      summary: Create a K-1 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleK1Body"
      responses:
        "201":
          description: Created K-1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleK1"

  /clients/{clientId}/k1s/{k1Id}:
    patch:
      operationId: updateScheduleK1
      tags: [scheduleK1]
      summary: Update a K-1
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: k1Id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScheduleK1Body"
      responses:
        "200":
          description: Updated K-1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleK1"
    delete:
      operationId: deleteScheduleK1
      tags: [scheduleK1]
      summary: Delete a K-1
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: k1Id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Dashboard ─────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-clients:
    get:
      operationId: getRecentClients
      tags: [dashboard]
      summary: Get recently added/updated clients
      responses:
        "200":
          description: Recent clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Settings:
      type: object
      required: [proTierEnabled]
      properties:
        proTierEnabled:
          description: >
            Phase G5 — when false the frontend hides the Planning tab and the
            dashboard Top-10 widget, and all planning endpoints respond 402.
            Controlled by the PRO_TIER_ENABLED env var on the api-server.
          type: boolean

    ProTierRequired:
      description: >
        Body of the HTTP 402 response on planning endpoints when the Pro
        tier feature flag is off. Carries a stable `code` the frontend
        keys off for the upgrade CTA.
      type: object
      required: [error, code, message]
      properties:
        error:
          type: string
        code:
          type: string
          enum: [PRO_TIER_REQUIRED]
        message:
          type: string

    # ── Client ──────────────────────────────────────────────────────────────
    Client:
      type: object
      required: [id, firstName, lastName, email, filingStatus, state, taxYear, dependentsUnder17, otherDependents, residencyChangedInYear, createdAt, updatedAt]
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        filingStatus:
          type: string
          enum: [single, married_filing_jointly, married_filing_separately, head_of_household, qualifying_widow]
        state:
          type: string
        taxYear:
          type: integer
        dependentsUnder17:
          type: integer
          description: Number of qualifying children under 17 with SSN (drives Child Tax Credit).
        otherDependents:
          type: integer
          description: Other qualifying dependents (drives the $500 Credit for Other Dependents).
        dependentsForCareCredit:
          type: integer
          description: Children age 12 and under (drives Dependent Care Credit eligibility).
        taxpayerAge:
          type: ["integer", "null"]
        spouseAge:
          type: ["integer", "null"]
        spouseEarnedIncome:
          type: ["number", "null"]
        hsaIsFamilyCoverage:
          type: boolean
        iraCoveredByWorkplacePlan:
          type: boolean
        eligibleEducatorCount:
          type: integer
          description: Count of eligible K-12 educators on the return (0/1/2). Each gets up to $300 above-the-line.
        acaAnnualPremium:
          type: ["number", "null"]
          description: Form 1095-A annual premium total (Marketplace plan).
        acaAnnualSlcsp:
          type: ["number", "null"]
          description: Form 1095-A Second Lowest Cost Silver Plan annual benchmark.
        acaAdvanceAptc:
          type: ["number", "null"]
          description: Advance premium tax credit payments received during the year.
        acaHouseholdSize:
          type: ["integer", "null"]
          description: Household size used for FPL determination. Defaults to filer + dependents if null.
        rentalActiveParticipant:
          type: boolean
          description: §469 active participation flag for rental real estate ($25k special allowance).
        rentalRealEstateProfessional:
          type: boolean
          description: §469 real estate professional (750+ hours, >50% of time) — no PAL limit.
        localityCode:
          type: ["string", "null"]
          description: |
            Local income tax jurisdiction code. Modeled values:
              "NYC" (state=NY, bracketed via IT-201);
              MD counties (state=MD): "MD-MONTGOMERY", "MD-HOWARD",
              "MD-PRINCE_GEORGES", "MD-BALTIMORE_CITY", "MD-BALTIMORE_CO",
              "MD-ANNE_ARUNDEL", "MD-HARFORD", "MD-CARROLL", "MD-FREDERICK",
              "MD-CHARLES", "MD-WASHINGTON", "MD-CECIL", "MD-CALVERT",
              "MD-ST_MARYS", "MD-WICOMICO", "MD-WORCESTER", "MD-DORCHESTER",
              "MD-ALLEGANY", "MD-CAROLINE", "MD-GARRETT", "MD-KENT",
              "MD-QUEEN_ANNES", "MD-SOMERSET", "MD-TALBOT";
              OH cities (state=OH): "OH-CINCINNATI", "OH-CLEVELAND",
              "OH-COLUMBUS", "OH-TOLEDO", "OH-AKRON", "OH-DAYTON",
              "OH-YOUNGSTOWN", "OH-CANTON", "OH-PARMA", "OH-LAKEWOOD";
              IN counties (state=IN): "IN-MARION", "IN-LAKE", "IN-ALLEN",
              "IN-HAMILTON", "IN-ST_JOSEPH", "IN-ELKHART", "IN-VANDERBURGH",
              "IN-PORTER", "IN-MONROE", "IN-TIPPECANOE".
            Null = no local PIT. Engine silently skips when state doesn't
            match the locality's parent state.
        socialSecurityBenefits:
          type: ["number", "null"]
          description: Total Social Security benefits received (Box 5 SSA-1099 + RRB-1099). Drives Pub 915 0/50/85% taxability calc.
        mfsLivedApartAllYear:
          type: boolean
          description: MFS filers only — true if the filer lived APART from their spouse for the entire tax year. Per Pub 915, default false treats MFS-with-spouse case (85% of SS taxable).
        isKiddieTaxFiler:
          type: boolean
          description: K8 — true when this return is for a child whose unearned income > $2,600 is taxed at the parent's marginal rate (Form 8615).
        parentsTopMarginalRate:
          type: ["number", "null"]
          description: K8 — parent's top marginal rate (decimal, e.g. 0.32) used in Form 8615 for the kiddie tax computation.
        priorYearItemized:
          type: ["boolean", "null"]
          description: E6 — Pub 525 tax-benefit rule. true when prior year itemized (Sched A > std ded) → state refund federal-taxable. Null = pipeline auto-derives from prior tax_returns row.
        residencyChangedInYear:
          type: boolean
          description: E12 — TRUE when filer moved between states during the tax year. Requires formerState + residencyChangeDate to be set; engine pro-rates AGI by days and computes both states' resident tax.
        formerState:
          type: ["string", "null"]
          description: E12 — Two-letter code of the prior resident state (BEFORE the move). clients.state is the post-move state. Null when full-year resident.
        residencyChangeDate:
          type: ["string", "null"]
          description: E12 — ISO date (YYYY-MM-DD) when residency changed. Filer was former-state resident from Jan 1 to this date (exclusive); current-state resident from this date (inclusive) to Dec 31.
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateClientBody:
      type: object
      required: [firstName, lastName, email, filingStatus, state, taxYear]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        filingStatus:
          type: string
          enum: [single, married_filing_jointly, married_filing_separately, head_of_household, qualifying_widow]

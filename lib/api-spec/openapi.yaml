        localityCode:
          type: ["string", "null"]
          description: Local income tax jurisdiction code (see Client.localityCode for the full set). Null = no local PIT.
        socialSecurityBenefits:
          type: ["number", "null"]
          description: Total SS benefits (SSA-1099 Box 5 + RRB-1099). Drives Pub 915 0/50/85% taxability.
        mfsLivedApartAllYear:
          type: boolean
          description: For MFS — true if lived apart all year (single-thresholds rules; default false → 85% of SS taxable).
        isKiddieTaxFiler:
          type: boolean
          description: K8 — true when return is for a child subject to kiddie tax (Form 8615; unearned income > $2,600 taxed at parent rate).
        parentsTopMarginalRate:
          type: ["number", "null"]
          description: Parent's top marginal rate (0.10–0.37) for Form 8615 computation when isKiddieTaxFiler = true.
        priorYearItemized:
          type: ["boolean", "null"]
          description: E6 — Pub 525 tax-benefit rule. true when prior year itemized → state refund federal-taxable. Null = pipeline auto-derives.
        residencyChangedInYear:
          type: boolean
          description: E12 — TRUE when filer moved between states during the tax year.
        formerState:
          type: ["string", "null"]
          description: E12 — Two-letter code of the prior resident state.
        residencyChangeDate:
          type: ["string", "null"]
          description: E12 — ISO date (YYYY-MM-DD) when residency changed.
        notes:
          type: ["string", "null"]

    UpdateClientBody:

          type: integer
        completedReturns:
          type: integer
        totalRefunds:
          type: number
        totalOwed:
          type: number
        documentsProcessed:
          type: integer
        averageRefund:
          type: ["number", "null"]

    # ── Planning opportunities (Phase G + H) ─────────────────────────────────
    OpportunityHit:
      type: object
      required: [strategyId, name, category, estSavings, confidence, cpaEffortHours, recurring, rationale, action, prerequisiteData, citation, inputs]
      properties:
        strategyId:
          type: string
        name:
          type: string
        category:
          type: string
          enum: [retirement, state, charitable, timing, business, investment, credits]
        estSavings:
          type: number
        confidence:
          type: number
        cpaEffortHours:
          type: number
        recurring:
          type: boolean
        rationale:
          type: string
        action:
          type: string
        prerequisiteData:
          type: array
          items:
            type: string
        citation:
          type: string
        inputs:
          type: object
          additionalProperties: true
        assumptions:
          description: >
            Phase H — H12. Plain-English assumptions / approximations the
            detector made when computing this opportunity. Each entry is
            one short statement. Rendered as a bulleted "Assumptions"
            section under the opportunity card.
          type: array
          items:
            type: string
        whatIf:
          description: >
            Phase H — H2 + H12. Engine-verified what-if data when the
            detector has a clean single-year mutation. Includes the exact
            mutations the engine ran, the resulting per-field delta,
            sign semantics, and an optional ±10% sensitivity range.
            Absent for detectors with no clean single-year mutation
            (G1.3 bunching, G1.8 DAF — multi-year; G1.7 §199A wage limit
            — engine doesn't model the limit yet).
          allOf:
            - $ref: "#/components/schemas/OpportunityWhatIf"
        multiYear:
          description: >
            Phase H — H3. Multi-year projection for strategies whose
            value materializes across years (G1.3 bunching, G1.8 DAF
            front-loading, G1.4 Roth conversion long-term). Includes a
            per-year burden trajectory for both baseline + scenario and
            a headline `totalSavings`.
          allOf:
            - $ref: "#/components/schemas/OpportunityMultiYear"

    OpportunityMultiYear:
      type: object
      required: [horizonYears, baselineYearTax, scenarioYearTax, yearByYearDelta, totalSavings, growthAssumption, multiYearAssumptions]
      properties:
        horizonYears:
          description: Years projected (inclusive of year 0).
          type: integer
        baselineYearTax:
          description: Per-year combined (fed + state) tax for the baseline trajectory.
          type: array
          items:
            type: number
        scenarioYearTax:
          description: Per-year combined (fed + state) tax for the scenario trajectory.
          type: array
          items:
            type: number
        yearByYearDelta:
          description: Per-year scenario−baseline delta (negative = scenario saves that year).
          type: array
          items:
            type: number
        totalSavings:
          description: >
            Multi-year savings = −sum(yearByYearDelta). POSITIVE = scenario
            saves tax over the window; NEGATIVE = costs more.
          type: number
        growthAssumption:
          description: Annual income growth factor used in the projection (1.03 = 3%/year).
          type: number
        multiYearAssumptions:
          description: Strategy-specific assumptions (distinct from single-year `assumptions`).
          type: array
          items:
            type: string

    OpportunityWhatIf:
      type: object
      required: [mutations, delta, semantics]
      properties:
        mutations:
          description: Exact mutations the engine ran. Transparent for CPA audit.
          type: array
          items:
            $ref: "#/components/schemas/WhatIfMutation"
        delta:
          $ref: "#/components/schemas/WhatIfDelta"
        semantics:
          description: >
            Whether `delta.combinedTaxDelta` represents the strategy's
            *savings* (negative = good) or its *current-year cost*
            (positive = price of the strategy, with long-term benefit
            captured in `estSavings`).
          type: string
          enum: [savings, cost]
        sensitivity:
          description: ±10% sensitivity range. Omitted for fixed-amount strategies.
          allOf:
            - $ref: "#/components/schemas/WhatIfSensitivity"

    WhatIfSensitivity:
      type: object
      required: [low, mid, high]
      properties:
        low:
          description: Result at 90% of the recommended mutation amount.
          type: number
        mid:
          description: Result at 100%. Matches `|whatIf.delta.combinedTaxDelta|`.
          type: number
        high:
          description: Result at 110% of the recommended mutation amount.
          type: number

    PlanningOpportunities:
      type: object
      required: [clientId, taxYear, catalogVersion, hits, totalEstSavings]
      properties:
        clientId:
          type: integer
        taxYear:
          type: integer
        catalogVersion:
          type: string
        hits:
          type: array
          items:
            $ref: "#/components/schemas/OpportunityHit"
        totalEstSavings:
          type: number
        crossStrategy:
          description: >
            Phase H — H7. Joint engine effect of stacking ALL "savings"
            strategies together. Present only when ≥2 H2-wired hits fire
            (single-hit case has no interaction to report). The
            `interactionEffect` field surfaces bracket-stacking or
            cliff-escape effects that the simple sum of individual
            deltas misses.
          allOf:
            - $ref: "#/components/schemas/CrossStrategySummary"

    CrossStrategySummary:
      type: object
      required: [stackedStrategyIds, combinedDelta, sumOfIndividualSavings, interactionEffect]
      properties:
        stackedStrategyIds:
          description: Strategy IDs (G1.x) whose mutations were stacked.
          type: array
          items:
            type: string
        combinedDelta:
          description: Engine delta from applying all stacked mutations together.
          allOf:
            - $ref: "#/components/schemas/WhatIfDelta"
        sumOfIndividualSavings:
          description: Sum of |combinedRefundDelta| across each stacked hit's individual H2 result.
          type: number
        interactionEffect:
          description: >
            Joint savings minus sum-of-individual-savings. NEGATIVE = stacking
            ERODES savings (most common — bracket stacking, double-counting
            relief). POSITIVE = compounding benefit (rare). ZERO = perfectly
            additive (rare).
          type: number

    PlanningHitListEntry:
      type: object
      required: [clientId, firstName, lastName, state, taxYear, agi, federalMarginalRate, planningScore, totalEstSavings, numHits, topHits]
      properties:
        clientId:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: ["string", "null"]
        state:
          type: string
        taxYear:
          type: integer
        agi:
          type: number
        federalMarginalRate:
          type: number
        planningScore:
          type: number
        totalEstSavings:
          type: number
        numHits:
          type: integer
        topHits:
          type: array
          items:
            $ref: "#/components/schemas/OpportunityHit"

    PlanningHitList:
      type: object
      required: [catalogVersion, entries]
      properties:
        catalogVersion:
          type: string
        entries:
          type: array
          items:
            $ref: "#/components/schemas/PlanningHitListEntry"

    PlanningMemo:
      type: object
      required: [clientId, taxYear, content, aiUsed, model]
      properties:
        clientId:
          type: integer
        taxYear:
          type: integer
        content:
          type: string
        aiUsed:
          type: boolean
        model:
          type: string

    PlanningMissingData:
      type: object
      required: [clientId, items, aiUsed, model]
      properties:
        clientId:
          type: integer
        items:
          type: array
          items:
            type: string
        aiUsed:
          type: boolean
        model:
          type: string

    PlanningMultiYear:
      type: object
      required: [clientId, taxYear, catalogVersion, hits, totalEstSavings, yearsAvailable, yearsCovered]
      properties:
        clientId:
          type: integer
        taxYear:
          description: Most-recent tax year present in the client's history.
          type: integer
        catalogVersion:
          type: string
        hits:
          description: G4 multi-year opportunity hits sorted by estSavings descending. Empty when fewer than 2 years of tax_returns are available.
          type: array
          items:
            $ref: "#/components/schemas/OpportunityHit"
        totalEstSavings:
          type: number
        yearsAvailable:
          description: Count of tax_returns rows present for this client.
          type: integer
        yearsCovered:
          description: The tax years included in the history, most recent first.
          type: array
          items:
            type: integer

    # ── What-if scenario (Phase H — H2) ──────────────────────────────────────
    WhatIfMutation:
      description: >
        A single change to apply to the baseline TaxReturnInputs. Discriminated
        by `kind`. The server validates per-kind required fields and rejects
        invalid combinations with HTTP 400.
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [set_adjustment, add_adjustment, remove_adjustment, set_client_field]
        adjustmentType:
          description: Required for set/add/remove_adjustment. The engine adjustment_type enum value.
          type: string
        amount:
          description: Required for set_adjustment and add_adjustment. The dollar amount.
          type: number
        field:
          description: Required for set_client_field. The ClientFacts key to override (e.g. filingStatus, state).
          type: string
        value:
          description: Required for set_client_field. The replacement value (string, number, boolean, or null).

    WhatIfScenarioBody:
      type: object
      required: [label, mutations]
      properties:
        scenarioId:
          description: Optional stable identifier (e.g. "G1.1-sep-14800") echoed back in the response.
          type: ["string", "null"]
        label:
          type: string
        mutations:
          type: array
          items:
            $ref: "#/components/schemas/WhatIfMutation"

    WhatIfDelta:
      description: >
        Field-level scenario−baseline deltas. Positive on a tax field means
        the scenario INCREASED that tax. combinedTaxDelta is the headline
        planning number (federal + state tax liability delta); negative =
        scenario reduces tax = savings.
      type: object
      required:
        - adjustedGrossIncome
        - taxableIncome
        - standardDeduction
        - itemizedDeductions
        - qbiDeduction
        - federalTaxLiability
        - stateTaxLiability
        - selfEmploymentTax
        - niitTax
        - amtTax
        - additionalMedicareTax
        - eitc
        - additionalChildTaxCredit
        - federalRefundOrOwed
        - stateRefundOrOwed
        - effectiveTaxRate
        - combinedTaxDelta
        - combinedRefundDelta
      properties:
        adjustedGrossIncome: { type: number }
        taxableIncome: { type: number }
        standardDeduction: { type: number }
        itemizedDeductions: { type: number }
        qbiDeduction: { type: number }
        federalTaxLiability: { type: number }
        stateTaxLiability: { type: number }
        selfEmploymentTax: { type: number }
        niitTax: { type: number }
        amtTax: { type: number }
        additionalMedicareTax: { type: number }
        eitc: { type: number }
        additionalChildTaxCredit: { type: number }
        federalRefundOrOwed: { type: number }
        stateRefundOrOwed: { type: number }
        effectiveTaxRate: { type: number }
        combinedTaxDelta: { type: number }
        combinedRefundDelta: { type: number }

    WhatIfSummary:
      description: >
        Side-by-side baseline + scenario summary of the most-relevant 1040
        fields. Frontend renders this as a 2-column comparison.
      type: object
      required:
        - adjustedGrossIncome
        - taxableIncome
        - federalTaxLiability
        - stateTaxLiability
        - federalRefundOrOwed
        - stateRefundOrOwed
        - effectiveTaxRate
      properties:
        adjustedGrossIncome: { type: number }
        taxableIncome: { type: number }
        federalTaxLiability: { type: number }
        stateTaxLiability: { type: number }
        federalRefundOrOwed: { type: number }
        stateRefundOrOwed: { type: number }
        effectiveTaxRate: { type: number }

    PlanningDiscoveryCandidate:
      type: object
      required: [name, ircSection, confidence, rationale, prerequisiteData, verification]
      properties:
        name:
          type: string
        ircSection:
          description: IRS Code section the strategy is anchored in (e.g., "IRC §1031").
          type: string
        confidence:
          description: LLM-self-reported confidence (0.0-1.0).
          type: number
        rationale:
          description: 1-2 sentence reasoning for why this strategy might apply to this client.
          type: string
        prerequisiteData:
          description: Data the CPA needs to gather to validate this candidate.
          type: array
          items:
            type: string
        verification:
          description: >
            Phase H — H8. Rule-engine cross-check of the LLM's
            suggestion. `catalog-overlap` = IRC matches a catalog
            strategy the engine did NOT trigger (CPA: is LLM right or
            missing data?). `extra-strategy` = not in the engine catalog
            (qualitative judgment only). Candidates that match an
            already-detected catalog strategy are filtered out entirely
            on the server.
          allOf:
            - $ref: "#/components/schemas/PlanningDiscoveryVerification"

    PlanningDiscoveryVerification:
      type: object
      required: [status, detail]
      properties:
        status:
          type: string
          enum: [catalog-overlap, extra-strategy]
        matchedCatalogId:
          description: Catalog strategy ID matched (catalog-overlap status only).
          type: ["string", "null"]
        detail:
          description: CPA-readable explanation of the verification status.
          type: string

    PlanningDiscovery:
      type: object
      required: [clientId, candidates, aiUsed, model]
      properties:
        clientId:
          type: integer
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/PlanningDiscoveryCandidate"
        aiUsed:
          type: boolean
        model:
          type: string

    PeerBenchmarkResponse:
      type: object
      required: [clientId, taxYear, clientAgi, clientEffectiveRate, cohort]
      properties:
        clientId:
          type: integer
        taxYear:
          type: integer
        clientAgi:
          type: number
        clientEffectiveRate:
          description: Client's own effective tax rate (totalTaxBurden / totalIncome).
          type: number
        cohort:
          $ref: "#/components/schemas/PeerBenchmarkCohort"

    PeerBenchmarkCohort:
      type: object
      required: [size, agiMin, agiMax, effectiveRateMean, effectiveRateMedian, effectiveRateP25, effectiveRateP75, clientPercentileRank]
      properties:
        size:
          description: Number of peer clients in the cohort (excluding the target client).
          type: integer
        agiMin:
          description: Lower AGI bound of the cohort band.
          type: number
        agiMax:
          description: Upper AGI bound of the cohort band.
          type: number
        effectiveRateMean:
          type: number
        effectiveRateMedian:
          type: number
        effectiveRateP25:
          description: 25th percentile effective tax rate in the cohort.
          type: number
        effectiveRateP75:
          description: 75th percentile effective tax rate in the cohort.
          type: number
        clientPercentileRank:
          description: >
            Client's rank in the cohort (0-100). 50 = exactly median.
            >50 = paying MORE than median peer (planning opportunity).
            <50 = paying LESS than median peer (already optimized or below
            expected exposure).
          type: number

    StateComparisonBody:
      type: object
      properties:
        targetStates:
          description: >
            Two-letter state codes to compare. Defaults to zero-income-tax
            states (TX, FL, NV, WA, TN) when omitted. The client's current
            state is automatically excluded.
          type: array
          items:
            type: string

    StateComparisonResult:
      type: object
      required: [state, deltaFederal, deltaState, deltaCombined, scenarioFederal, scenarioState]
      properties:
        state:
          type: string
        deltaFederal:
          description: Federal tax liability delta (scenario − baseline). Usually positive (lower SALT deduction increases federal tax).
          type: number
        deltaState:
          description: State tax liability delta. Usually negative (target is lower-tax state).
          type: number
        deltaCombined:
          description: Combined federal + state delta. NEGATIVE = move saves money.
          type: number
        scenarioFederal:
          description: Federal tax liability if client lived in target state.
          type: number
        scenarioState:
          description: State tax liability in target state.
          type: number

    StateComparisonResponse:
      type: object
      required: [clientId, taxYear, baselineState, baselineFederal, baselineState_tax, results]
      properties:
        clientId:
          type: integer
        taxYear:
          type: integer
        baselineState:
          description: Client's current resident state.
          type: string
        baselineFederal:
          description: Current federal tax liability.
          type: number
        baselineState_tax:
          description: Current state tax liability.
          type: number
        results:
          description: One per target state, sorted by deltaCombined ascending (biggest savings first).
          type: array
          items:
            $ref: "#/components/schemas/StateComparisonResult"

    RothOptimizerBody:
      type: object
      required: [horizonYears, traditionalIraBalance]
      properties:
        horizonYears:
          description: Number of years to ladder conversions over (1-75; a human planning horizon).
          type: integer
          minimum: 1
          maximum: 75
        traditionalIraBalance:
          description: Current traditional/SEP/SIMPLE IRA balance available to convert.
          type: number
          minimum: 0
        incomeGrowth:
          description: Annual income-growth factor for the projection (1.03 = 3%/yr). Default 1.03.
          type: number
        iraGrowth:
          description: Annual growth factor for the un-converted IRA balance (1.05 = 5%/yr). Default 1.05.
          type: number

    RothLadderYear:
      type: object
      required: [yearIndex, taxYear, taxableIncomeBeforeConversion, bracketCeiling, marginalRate, conversion, conversionTaxCost, iraBalanceRemaining]
      properties:
        yearIndex:
          description: 0-based offset from the baseline year.
          type: integer
        taxYear:
          type: integer
        taxableIncomeBeforeConversion:
          description: Ordinary taxable income before any conversion this year.
          type: number
        bracketCeiling:
          description: Top of the current federal ordinary bracket (the fill target).
          type: number
        marginalRate:
          description: Marginal rate the conversion is taxed at (current bracket's rate).
          type: number
        conversion:
          description: Recommended conversion — fill the bracket, capped by the IRA balance.
          type: number
        conversionTaxCost:
          description: Engine-computed current-year federal tax cost of the conversion.
          type: number
        iraBalanceRemaining:
          description: Traditional-IRA balance remaining after this year's conversion.
          type: number

    RothLadderPlan:
      type: object
      required: [years, totalConverted, totalConversionTaxCost, blendedConversionRate, startingIraBalance, horizonYears, incomeGrowth, iraGrowth, assumptions]
      properties:
        years:
          type: array
          items:
            $ref: "#/components/schemas/RothLadderYear"
        totalConverted:
          description: Total converted across the horizon (now growing tax-free in the Roth).
          type: number
        totalConversionTaxCost:
          description: Total current-year federal tax paid on the laddered conversions.
          type: number
        blendedConversionRate:
          description: Blended rate paid on the conversions (cost / converted).
          type: number
        startingIraBalance:
          type: number
        horizonYears:
          type: integer
        incomeGrowth:
          type: number
        iraGrowth:
          type: number
        rmdAvoidance:
          description: >
            Lifetime RMD-avoidance value model — only present when the client's
            age is known (needed to time RMDs); null otherwise.
          anyOf:
            - $ref: "#/components/schemas/RmdAvoidanceProjection"
            - type: "null"
        assumptions:
          type: array
          items:
            type: string

    RmdAvoidanceProjection:
      type: object
      required: [valueHorizonYears, firstRmdTaxYear, baselineLifetimeFederalTax, scenarioLifetimeFederalTax, lifetimeFederalTaxSaved, baselineRmdTotal, scenarioRmdTotal, baselineFinalIraBalance, scenarioFinalIraBalance, baselineLifetimeIrmaa, scenarioLifetimeIrmaa, netLifetimeValue, scenarioRothBalanceFinal, assumptions]
      properties:
        valueHorizonYears:
          type: integer
        firstRmdTaxYear:
          description: First projected tax year an RMD is required, or null if none in horizon.
          type: [integer, "null"]
        baselineLifetimeFederalTax:
          description: Total federal tax over the horizon with NO conversions (full RMDs).
          type: number
        scenarioLifetimeFederalTax:
          description: Total federal tax over the horizon WITH the conversion ladder (smaller RMDs).
          type: number
        lifetimeFederalTaxSaved:
          description: baseline − scenario federal tax. POSITIVE = converting wins over the horizon.
          type: number
        baselineRmdTotal:
          type: number
        scenarioRmdTotal:
          type: number
        baselineFinalIraBalance:
          type: number
        scenarioFinalIraBalance:
          type: number
        baselineLifetimeIrmaa:
          description: Lifetime Medicare IRMAA surcharge (Part B+D) with no conversions.
          type: number
        scenarioLifetimeIrmaa:
          description: Lifetime IRMAA with the ladder — conversions raise MAGI and can bump tiers.
          type: number
        netLifetimeValue:
          description: Federal tax saved minus the extra IRMAA the conversions cost. POSITIVE = converting wins.
          type: number
        scenarioRothBalanceFinal:
          description: Tax-free Roth balance at the horizon (the converted dollars, grown) — upside the tax-only figure omits.
          type: number
        assumptions:
          type: array
          items:
            type: string

    RothOptimizerResponse:
      type: object
      required: [clientId, taxYear, plan]
      properties:
        clientId:
          type: integer
        taxYear:
          type: integer
        plan:
          $ref: "#/components/schemas/RothLadderPlan"

    WhatIfResponse:
      type: object
      required: [clientId, taxYear, scenarioId, label, mutations, delta, baseline, scenario]
      properties:
        clientId:
          type: integer
        taxYear:
          type: integer
        scenarioId:
          type: ["string", "null"]
        label:
          type: string
        mutations:
          type: array
          items:
            $ref: "#/components/schemas/WhatIfMutation"
        delta:
          $ref: "#/components/schemas/WhatIfDelta"
        baseline:
          $ref: "#/components/schemas/WhatIfSummary"
        scenario:
          $ref: "#/components/schemas/WhatIfSummary"

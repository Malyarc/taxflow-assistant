          type: ["number", "null"]
        qualifiedTuition:
          type: ["number", "null"]
        scholarshipsGrants:
          type: ["number", "null"]
        studentLoanInterest:
          type: ["number", "null"]
        annualPremium:
          type: ["number", "null"]
        annualSlcsp:
          type: ["number", "null"]
        annualAdvancePtc:
          type: ["number", "null"]
        netSocialSecurityBenefits:
          type: ["number", "null"]
        gamblingWinnings:
          type: ["number", "null"]
        gamblingFederalWithheld:
          type: ["number", "null"]


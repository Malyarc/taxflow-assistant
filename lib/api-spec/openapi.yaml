    # ── TaxDocument ──────────────────────────────────────────────────────────
    TaxDocument:
      type: object
      required: [id, clientId, documentType, fileName, status, createdAt]
      properties:
        id:
          type: integer
        clientId:
          type: integer
        documentType:
          type: string
          enum: [w2, form_1099, form_1098, schedule_k1, other]
        fileName:
          type: string
        fileContent:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, processing, pending_review, approved, rejected, extracted, failed]
          description: |
            Lifecycle: pending → processing → pending_review → approved|rejected (or failed).
            "extracted" is a legacy value for documents uploaded before the CPA-review gate;
            UI should treat it as a synonym of "approved".
        extractedText:
          type: ["string", "null"]
        linkedRecordId:
          type: ["integer", "null"]
          description: PK of the w2_data / form_1099_data row this doc was approved into.
        linkedRecordType:
          type: ["string", "null"]
          enum: [w2, form1099, null]
        rejectionReason:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    UploadDocumentBody:
      type: object
      required: [documentType, fileName, fileContent]
      properties:
        documentType:
          type: string
          enum: [w2, form_1099, form_1098, schedule_k1, other]
        fileName:
          type: string
        fileContent:
          type: string
          description: Base64-encoded file content

    ApproveExtractionBody:
      type: object
      required: [recordType, taxYear]
      description: |
        Body for POST /clients/:clientId/documents/:documentId/approve. The CPA
        confirms (and optionally edits) the extracted values; the server inserts
        the corresponding w2_data or form_1099_data row with an audit-log entry.
      properties:
        recordType:
          type: string
          enum: [w2, form1099]
        taxYear:
          type: integer
        # W-2 fields (relevant when recordType === "w2")
        employerName:
          type: ["string", "null"]
        employerEin:
          type: ["string", "null"]
        employeeSSN:
          type: ["string", "null"]
        wagesBox1:
          type: ["number", "null"]
        federalTaxWithheldBox2:
          type: ["number", "null"]
        socialSecurityWagesBox3:
          type: ["number", "null"]
        socialSecurityTaxBox4:
          type: ["number", "null"]
        medicareWagesBox5:
          type: ["number", "null"]
        medicareTaxBox6:
          type: ["number", "null"]
        stateWagesBox16:
          type: ["number", "null"]
        stateTaxWithheldBox17:
          type: ["number", "null"]
        # 1099 fields (relevant when recordType === "form1099")
        formType:
          type: ["string", "null"]
          enum: [NEC, MISC, INT, DIV, B, R, G, K, null]
        payerName:
          type: ["string", "null"]
        payerTin:
          type: ["string", "null"]
        recipientTin:
          type: ["string", "null"]
        federalTaxWithheld:
          type: ["number", "null"]
        stateTaxWithheld:
          type: ["number", "null"]
        # 1099-NEC / MISC
        nonemployeeCompensation:
          type: ["number", "null"]
        rents:
          type: ["number", "null"]
        royalties:
          type: ["number", "null"]
        otherIncome:
          type: ["number", "null"]
        fishingBoatProceeds:
          type: ["number", "null"]
        medicalAndHealthcare:
          type: ["number", "null"]
        # 1099-INT

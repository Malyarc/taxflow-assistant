  # ── Dashboard ─────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-clients:
    get:
      operationId: getRecentClients
      tags: [dashboard]
      summary: Get recently added/updated clients
      responses:
        "200":
          description: Recent clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Client ──────────────────────────────────────────────────────────────
    Client:
      type: object
      required: [id, firstName, lastName, email, filingStatus, state, taxYear, dependentsUnder17, otherDependents, createdAt, updatedAt]
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        filingStatus:
          type: string
          enum: [single, married_filing_jointly, married_filing_separately, head_of_household, qualifying_widow]
        state:
          type: string
        taxYear:
          type: integer
        dependentsUnder17:
          type: integer
          description: Number of qualifying children under 17 with SSN (drives Child Tax Credit).
        otherDependents:
          type: integer
          description: Other qualifying dependents (drives the $500 Credit for Other Dependents).
        dependentsForCareCredit:
          type: integer
          description: Children age 12 and under (drives Dependent Care Credit eligibility).
        taxpayerAge:
          type: ["integer", "null"]
        spouseAge:
          type: ["integer", "null"]
        spouseEarnedIncome:
          type: ["number", "null"]
        hsaIsFamilyCoverage:
          type: boolean
        iraCoveredByWorkplacePlan:
          type: boolean
        eligibleEducatorCount:
          type: integer
          description: Count of eligible K-12 educators on the return (0/1/2). Each gets up to $300 above-the-line.
        acaAnnualPremium:
          type: ["number", "null"]
          description: Form 1095-A annual premium total (Marketplace plan).
        acaAnnualSlcsp:
          type: ["number", "null"]
          description: Form 1095-A Second Lowest Cost Silver Plan annual benchmark.
        acaAdvanceAptc:
          type: ["number", "null"]
          description: Advance premium tax credit payments received during the year.
        acaHouseholdSize:
          type: ["integer", "null"]
          description: Household size used for FPL determination. Defaults to filer + dependents if null.
        rentalActiveParticipant:
          type: boolean
          description: §469 active participation flag for rental real estate ($25k special allowance).
        rentalRealEstateProfessional:
          type: boolean
          description: §469 real estate professional (750+ hours, >50% of time) — no PAL limit.
        localityCode:
          type: ["string", "null"]
          description: Local income tax jurisdiction (currently "NYC"). Null = no local PIT.
          enum: ["NYC", null]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateClientBody:
      type: object
      required: [firstName, lastName, email, filingStatus, state, taxYear]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        filingStatus:
          type: string
          enum: [single, married_filing_jointly, married_filing_separately, head_of_household, qualifying_widow]
        state:
          type: string
        taxYear:
          type: integer
        dependentsUnder17:
          type: integer
        otherDependents:
          type: integer
        dependentsForCareCredit:
          type: integer
        taxpayerAge:
          type: ["integer", "null"]
        spouseAge:
          type: ["integer", "null"]
        spouseEarnedIncome:
          type: ["number", "null"]
        hsaIsFamilyCoverage:
          type: boolean
        iraCoveredByWorkplacePlan:
          type: boolean
        eligibleEducatorCount:
          type: integer
        acaAnnualPremium:
          type: ["number", "null"]
        acaAnnualSlcsp:
          type: ["number", "null"]
        acaAdvanceAptc:
          type: ["number", "null"]
        acaHouseholdSize:
          type: ["integer", "null"]

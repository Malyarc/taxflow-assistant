        spouseEarnedIncome:
          type: ["number", "null"]
        hsaIsFamilyCoverage:
          type: boolean
        iraCoveredByWorkplacePlan:
          type: boolean
        eligibleEducatorCount:
          type: integer
        acaAnnualPremium:
          type: ["number", "null"]
        acaAnnualSlcsp:
          type: ["number", "null"]
        acaAdvanceAptc:
          type: ["number", "null"]
        acaHouseholdSize:
          type: ["integer", "null"]
        rentalActiveParticipant:

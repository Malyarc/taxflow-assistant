  /clients/{clientId}/form-8606:
    get:
      operationId: getForm8606
      tags: [taxReturns]
      summary: Compute Form 8606 §408(d)(2) pro-rata split (Phase H — H6)
      description: >
        Reads the client's traditional IRA balance + after-tax basis from
        H5 asset records, plus any `roth_conversion_amount` adjustment
        and `nondeductible_ira_contribution` adjustment for the tax year.
        Returns the structured pro-rata fields. Returns 200 even when no
        conversion happened — engine returns zero-conversion result.
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Form 8606 pro-rata result
          content:
            application/json:
              schema:

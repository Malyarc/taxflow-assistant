    # ── Form 8606 (Phase H — H6) ──────────────────────────────────────────────
    Form8606Result:
      type: object
      required:
        - taxYear
        - priorBasis
        - nondeductibleContribution
        - totalBasisAvailable
        - distributionsAndConversions
        - yearEndBalance
        - otherDistributions
        - conversionAmount
        - proRataFraction
        - excludedAmount
        - taxableAmount
        - basisCarryforward
        - excludedFractionPct
      properties:
        taxYear:
          type: integer
        priorBasis:
          description: Form 8606 Line 2 — basis carried in from prior year.
          type: number
        nondeductibleContribution:
          description: Form 8606 Line 1 — nondeductible contribution this year.
          type: number
        totalBasisAvailable:
          description: Form 8606 Line 3 — total basis available this year (Line 1 + Line 2).
          type: number
        distributionsAndConversions:
          description: Form 8606 Line 4 — distributions + conversions during the year.
          type: number
        yearEndBalance:
          description: Form 8606 Line 6 — Dec 31 aggregate balance.
          type: number
        otherDistributions:
          description: Form 8606 Line 7 — distributions only (not conversions).
          type: number
        conversionAmount:
          description: Form 8606 Line 8 — Roth conversion this year.
          type: number
        proRataFraction:
          description: Form 8606 Line 10 — pro-rata fraction (0.0-1.0). basis / (year-end + distributions + conversions).
          type: number
        excludedAmount:
          description: Form 8606 Line 11 — tax-free portion of the Roth conversion (basis recovered).
          type: number
        taxableAmount:
          description: Form 8606 Line 17+18 — taxable amount of the Roth conversion. Flows to Form 1040 Line 4b.
          type: number
        basisCarryforward:
          description: Form 8606 Line 14 — basis remaining for next year's Form 8606.
          type: number
        excludedFractionPct:
          description: Pro-rata fraction as a percentage (0-100), for display.
          type: number
        partIII:
          description: >
            Phase H — H6. Form 8606 Part III (Lines 19-25). Roth IRA
            distribution basis recovery + qualified-distribution gate.
            Present when client took a Roth distribution (sum of
            `roth_ira_distribution` adjustments > 0) OR has a tracked
            Roth contributions basis (H5 roth_ira afterTaxBasis > 0).
          allOf:
            - $ref: "#/components/schemas/Form8606PartIIIResult"

    Form8606PartIIIResult:
      type: object
      required:
        - isQualifiedDistribution
        - basisRecovered
        - taxableEarnings
        - earlyDistributionPenalty
        - basisRemaining
        - line19_distribution
        - line20_qualifiedException
        - line21_nonExceptionDistribution
        - line22_contributionBasis
        - line23_remainingAfterBasis
        - line25_taxableAmount
      properties:
        isQualifiedDistribution:
          description: Over 59½ AND first-Roth 5+ years old → entire distribution tax-free, no penalty.
          type: boolean
        basisRecovered:
          description: Tax-free portion (contribution basis recovery).
          type: number
        taxableEarnings:
          description: Ordinary income portion (flows to Form 1040 Line 4b).
          type: number
        earlyDistributionPenalty:
          description: 10% additional tax on taxableEarnings when under 59½ (IRC §72(t)).
          type: number
        basisRemaining:
          description: Remaining Roth contribution basis carried to next year.
          type: number
        line19_distribution:
          description: Total Roth IRA distributions this year.
          type: number
        line20_qualifiedException:
          description: First-home / education / etc. exception amount (Pub 590-B).
          type: number
        line21_nonExceptionDistribution:
          description: Line 19 − Line 20.
          type: number
        line22_contributionBasis:
          description: Basis in Roth contributions (lifetime).
          type: number
        line23_remainingAfterBasis:
          description: Line 21 − Line 22 — remaining after contribution basis recovery.
          type: number
        line25_taxableAmount:
          description: Taxable amount of Roth distribution (Form 1040 Line 4b).
          type: number


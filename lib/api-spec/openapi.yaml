    post:
      operationId: createScheduleK1
      tags: [scheduleK1]
      summary: Create a K-1 record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleK1Body"
      responses:
        "201":
          description: Created K-1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleK1"

  /clients/{clientId}/k1s/{k1Id}:
    patch:
      operationId: updateScheduleK1
      tags: [scheduleK1]
      summary: Update a K-1
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: k1Id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScheduleK1Body"
      responses:
        "200":
          description: Updated K-1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleK1"
    delete:
      operationId: deleteScheduleK1
      tags: [scheduleK1]
      summary: Delete a K-1
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: k1Id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":

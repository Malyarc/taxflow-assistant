    CreateClientBody:
      type: object
      required: [firstName, lastName, email, filingStatus, state, taxYear]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        filingStatus:
          type: string
          enum: [single, married_filing_jointly, married_filing_separately, head_of_household, qualifying_widow]
        state:
          type: string
        taxYear:
          type: integer
        dependentsUnder17:
          type: integer
        eitcQualifyingChildren:
          type: ["integer", "null"]
          description: E1 — count of EITC qualifying children (§32(c)(3); null → dependentsUnder17).
        otherDependents:
          type: integer
        dependentsForCareCredit:
          type: integer
        taxpayerAge:
          type: ["integer", "null"]
        spouseAge:
          type: ["integer", "null"]
        taxpayerBlind:
          type: boolean
          description: Taxpayer is legally blind at year end (extra standard-deduction box, IRC §63(f)).
        spouseBlind:
          type: boolean
          description: Spouse is legally blind at year end (MFJ/QSS extra standard-deduction box).
        spouseEarnedIncome:
          type: ["number", "null"]
        hsaIsFamilyCoverage:
          type: boolean
        iraCoveredByWorkplacePlan:
          type: boolean
        eligibleEducatorCount:
          type: integer
        acaAnnualPremium:
          type: ["number", "null"]
        acaAnnualSlcsp:
          type: ["number", "null"]
        acaAdvanceAptc:
          type: ["number", "null"]
        acaHouseholdSize:
          type: ["integer", "null"]
        rentalActiveParticipant:
          type: boolean
        rentalRealEstateProfessional:
          type: boolean
        localityCode:
          type: ["string", "null"]
          description: Local income tax jurisdiction code (see Client.localityCode for the full set). Null = no local PIT.
        socialSecurityBenefits:
          type: ["number", "null"]
          description: Total SS benefits (SSA-1099 Box 5 + RRB-1099). Drives Pub 915 0/50/85% taxability.
        mfsLivedApartAllYear:
          type: boolean
          description: For MFS — true if lived apart all year (single-thresholds rules; default false → 85% of SS taxable).
        isKiddieTaxFiler:
          type: boolean
          description: K8 — true when return is for a child subject to kiddie tax (Form 8615; unearned income > $2,600 taxed at parent rate).
        claimedAsDependent:
          type: boolean
          description: E3b — true when this taxpayer can be claimed as a dependent on another return → IRC §63(c)(5) limited standard deduction. isKiddieTaxFiler also implies this.
        parentsTopMarginalRate:
          type: ["number", "null"]
          description: Parent's top marginal rate (0.10–0.37) for Form 8615 computation when isKiddieTaxFiler = true.
        priorYearItemized:
          type: ["boolean", "null"]
          description: E6 — Pub 525 tax-benefit rule. true when prior year itemized → state refund federal-taxable. Null = pipeline auto-derives.
        residencyChangedInYear:
          type: boolean
          description: E12 — TRUE when filer moved between states during the tax year.
        formerState:
          type: ["string", "null"]
          description: E12 — Two-letter code of the prior resident state.
        residencyChangeDate:
          type: ["string", "null"]
          description: E12 — ISO date (YYYY-MM-DD) when residency changed.
        riskTolerance:
          type: ["string", "null"]
        targetRetirementAge:
          type: ["integer", "null"]
        estatePlanStage:
          type: ["string", "null"]
        planningGoals:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]


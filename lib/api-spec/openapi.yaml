      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: adjustmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Rental properties (Schedule E) ────────────────────────────────────────
  /clients/{clientId}/rental-properties:
    get:
      operationId: listRentalProperties
      tags: [rentalProperties]
      summary: List all rental properties for a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of rental properties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RentalProperty"
    post:
      operationId: createRentalProperty
      tags: [rentalProperties]
      summary: Create a rental property record
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRentalPropertyBody"
      responses:
        "201":
          description: Created rental property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalProperty"

  /clients/{clientId}/rental-properties/{propertyId}:
    patch:
      operationId: updateRentalProperty
      tags: [rentalProperties]
